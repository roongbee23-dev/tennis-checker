<html lang="th">

<style>

  .auth-tab { flex: 1; padding: 9px; text-align: center; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 6px; color: #4b6280; border: none; background: none; font-family: inherit; transition: all 0.2s; }
  .auth-tab.active { background: #1a2840; color: #dde8f0; }
  .auth-input { width: 100%; background: #050d18; border: 1px solid #1a2840; border-radius: 9px; padding: 12px 16px; color: #dde8f0; font-size: 14px; font-family: inherit; margin-bottom: 12px; outline: none; transition: border 0.2s; }
  .auth-input:focus { border-color: #2dd4bf; }
  .auth-btn { width: 100%; background: linear-gradient(135deg,#2dd4bf,#0891b2); color: #fff; border: none; border-radius: 9px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; margin-bottom: 12px; transition: opacity 0.2s; }
  .auth-btn:hover { opacity: 0.9; }
  .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-divider { text-align: center; color: #334155; font-size: 13px; margin: 4px 0 12px; position: relative; }
  .auth-divider::before, .auth-divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: #1a2840; }
  .auth-divider::before { left: 0; }
  .auth-divider::after { right: 0; }
  .google-btn { width: 100%; background: #fff; color: #333; border: none; border-radius: 9px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 10px; transition: opacity 0.2s; }
  .google-btn:hover { opacity: 0.9; }
  .auth-msg { font-size: 13px; text-align: center; margin-top: 10px; min-height: 20px; }

  .header-right { display: flex; align-items: center; gap: 12px; }
  .user-email { font-size: 12px; color: #7a99b8; }
  .logout-btn { background: #1a2840; color: #f87171; border: 1px solid #5f1a1a; border-radius: 7px; padding: 7px 14px; font-size: 12px; cursor: pointer; font-family: inherit; }

  .main { padding: 20px 24px; max-width: 960px; margin: 0 auto; }

  /* Settings */
  .settings-card { background: #0f1923; border: 1px solid #1a2840; border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; }

  .tg-input { flex: 1; background: #050d18; border: 1px solid #1a2840; border-radius: 8px; padding: 9px 14px; color: #dde8f0; font-size: 13px; font-family: inherit; outline: none; }
  .tg-input:focus { border-color: #2dd4bf; }
  .tg-save-btn { background: #0f2b1f; color: #4ade80; border: 1px solid #166534; border-radius: 8px; padding: 9px 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; }

  #lastCheck { font-size: 12px; color: #4b6280; }

  .tg-info { background: #0a1f14; border: 1px solid #14532d; border-radius: 10px; padding: 10px 16px; margin-bottom: 16px; font-size: 13px; color: #86efac; }
  .tg-warn { background: #1c0e0e; border: 1px solid #7f1d1d; border-radius: 10px; padding: 10px 16px; margin-bottom: 16px; font-size: 13px; color: #f87171; }

  .alert-box { background: #032012; border: 1px solid #22c55e; border-radius: 12px; padding: 14px 18px; margin-bottom: 16px; }
  .alert-box h2 { color: #4ade80; font-size: 15px; margin-bottom: 8px; }
  .alert-line { color: #bbf7d0; font-size: 13px; padding-left: 10px; margin-top: 2px; }
  .alert-label { color: #86efac; font-weight: 700; margin-top: 6px; }
  .book-btn { display: inline-block; margin-top: 10px; background: #22c55e; color: #fff; padding: 8px 18px; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 13px; }

  .card { background: #0f1923; border: 1px solid #1a2840; border-radius: 12px; padding: 14px 16px; }
  .card.checking { background: #0a1e35; border-color: #38bdf8; }
  .card.found { background: #032012; border-color: #22c55e; }
  .card.notfound { background: #150808; border-color: #5f1a1a; }

  .card-title { font-weight: 700; font-size: 14px; margin-bottom: 3px; }
  .card-date { font-size: 11px; color: #4b6280; margin-bottom: 8px; }
  .loc-title { font-size: 11px; font-weight: 600; margin-bottom: 3px; margin-top: 5px; }
  .slot-row { display: flex; justify-content: space-between; background: #050d18; border-radius: 5px; padding: 4px 8px; margin-bottom: 2px; font-size: 11px; }
  .slot-time { color: #4b6280; }
  .slot-avail { color: #22c55e; font-weight: 600; }
  .slot-full { color: #e05050; font-weight: 600; }
  .court-names { font-size: 10px; color: #4ade80; margin-top: 2px; line-height: 1.5; }
  .pending { color: #253040; font-size: 12px; }

  .log-box { background: #0f1923; border: 1px solid #1a2840; border-radius: 10px; padding: 12px 16px; margin-top: 16px; }
  .log-title { color: #4b6280; font-size: 12px; margin-bottom: 6px; }
  .log-inner { max-height: 120px; overflow-y: auto; }
  .log-line { font-size: 11px; color: #374860; margin-bottom: 1px; font-family: monospace; }
</style>

<body>

<!-- AUTH PAGE -->

<script>
// ============ SUPABASE ============
const SUPABASE_URL = 'https://szckhdejflscildnuthy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_g6lcfzaErpOO-vliN0VB8w_GyGdpM-h';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const PROXY_URL = "https://crystal-proxy.tennischecker.workers.dev";
const BOT_TOKEN = "8979299516:AAEwY_fKOaflP-Y3o-DnJqKrzCViLJvel-c";
const DAY_NAMES = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัส","ศุกร์","เสาร์"];
const ALL_DAYS = [{v:1,l:"จันทร์"},{v:2,l:"อังคาร"},{v:3,l:"พุธ"},{v:4,l:"พฤหัส"},{v:5,l:"ศุกร์"},{v:6,l:"เสาร์"},{v:0,l:"อาทิตย์"}];
const ALL_TIMES = ["06:00","07:00","08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00","21:00","22:00","23:00"];
const LOCATIONS = [
  { locId:"LOC001", locName:"Crystal Sports", courts:[{id:1,name:"North-1"},{id:2,name:"North-2"},{id:3,name:"North-3"},{id:4,name:"Center-1"},{id:5,name:"Center-2"},{id:6,name:"South-1"},{id:7,name:"South-2"},{id:8,name:"South-3"}] },
  { locId:"LOC002", locName:"Crystal Sports G", courts:[{id:18,name:"G North-1"},{id:19,name:"G North-2"},{id:20,name:"G North-3"},{id:21,name:"G Center-1"},{id:22,name:"G Center-2"},{id:23,name:"G Center-3"},{id:24,name:"G South-1"},{id:25,name:"G South-2"},{id:26,name:"G South-3"}] },
];

let currentUser = null;
let userSettings = null;
let groups = [];
let groupResults = {};
let autoTimer = null, cdTimer = null, autoOn = false;
const INTERVAL = 30 * 60 * 1000;

// ============ AUTH ============
function switchTab(tab) {
  document.getElementById('tabLogin').classList.toggle('active', tab==='login');
  document.getElementById('tabRegister').classList.toggle('active', tab==='register');
  document.getElementById('formLogin').style.display = tab==='login'?'block':'none';
  document.getElementById('formRegister').style.display = tab==='register'?'block':'none';
}

async function loginEmail() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const msg = document.getElementById('loginMsg');
  msg.className = 'auth-msg'; msg.textContent = 'กำลังเข้าสู่ระบบ...';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { msg.className = 'auth-msg error'; msg.textContent = error.message; }
  else { msg.className = 'auth-msg success'; msg.textContent = 'เข้าสู่ระบบสำเร็จ!'; }
}

async function registerEmail() {
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const msg = document.getElementById('regMsg');
  msg.className = 'auth-msg'; msg.textContent = 'กำลังสมัคร...';
  const { error } = await sb.auth.signUp({ email, password });
  if (error) { msg.className = 'auth-msg error'; msg.textContent = error.message; }
  else { msg.className = 'auth-msg success'; msg.textContent = 'สมัครสำเร็จ! กรุณายืนยันอีเมลก่อน login'; }
}

async function loginGoogle() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href }
  });
}

async function logout() {
  await sb.auth.signOut();
  showAuth();
}

function showAuth() {
  document.getElementById('authPage').style.display = 'flex';
  document.getElementById('appPage').style.display = 'none';
  currentUser = null; userSettings = null;
}

async function showApp(user) {
  currentUser = user;
  document.getElementById('authPage').style.display = 'none';
  document.getElementById('appPage').style.display = 'block';
  document.getElementById('userEmail').textContent = user.email;
  await loadUserSettings();
}

// ============ USER SETTINGS ============
async function loadUserSettings() {
  const { data, error } = await sb.from('user_settings').select('*').eq('id', currentUser.id).single();
  if (data) {
    userSettings = data;
    document.getElementById('tgChatId').value = data.telegram_chat_id || '';
    groups = data.court_groups || defaultGroups();
  } else {
    groups = defaultGroups();
  }
  renderGroups();
  renderResults();
  updateTgInfoBar();
}

async function saveTelegramId() {
  const chatId = document.getElementById('tgChatId').value.trim();
  const msg = document.getElementById('tgSaveMsg');
  msg.style.color = '#7a99b8'; msg.textContent = 'กำลังบันทึก...';
  const { error } = await sb.from('user_settings').upsert({ id: currentUser.id, telegram_chat_id: chatId, email: currentUser.email });
  if (error) { msg.style.color='#f87171'; msg.textContent='❌ '+error.message; }
  else { msg.style.color='#4ade80'; msg.textContent='✅ บันทึกแล้ว'; if(userSettings) userSettings.telegram_chat_id = chatId; updateTgInfoBar(); }
  setTimeout(()=>msg.textContent='', 3000);
}

async function saveGroups() {
  const el = document.getElementById('saveGroupStatus');
  el.style.color='#7a99b8'; el.textContent='กำลังบันทึก...';

// ============ TELEGRAM ============
async function sendTelegram(message) {
  const chatId = document.getElementById('tgChatId').value.trim();
  if (!chatId) return { ok: false, description: 'ไม่มี Chat ID' };
  const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({chat_id: chatId, text: message, parse_mode:'HTML'})
  });
  return await res.json();
}

async function testTelegram() {
  const d = await sendTelegram('🎾 <b>Crystal Sports Court Checker</b>\n\nการแจ้งเตือนพร้อมใช้งาน! ✅\nบัญชี: '+currentUser.email);
  alert(d.ok ? '✅ ส่งสำเร็จ! เช็ค Telegram ได้เลย' : '❌ Error: '+d.description);
}

// ============ GROUPS ============
function defaultGroups() {
  return [{ id: Date.now(), name: 'Group 1', days: [2,3,4,5], times: ['18:00','19:00'], active: true }];
}
function addGroup() {
  groups.push({ id: Date.now(), name: `Group ${groups.length+1}`, days: [2,3,4,5], times: ['18:00','19:00'], active: true });
  renderGroups();
}
function deleteGroup(id) {
  if (groups.length <= 1) return;
  groups = groups.filter(g => g.id !== id);
  delete groupResults[id];
  renderGroups(); renderResults();
}
function toggleGroup(id) {
  const g = groups.find(g => g.id === id);
  if (g) { g.active = !g.active; renderGroups(); }
}
function toggleDay(gId, day) {
  const g = groups.find(g => g.id === gId);
  if (!g) return;
  g.days = g.days.includes(day) ? g.days.filter(d=>d!==day) : [...g.days, day];
  renderGroups();
}
function toggleTime(gId, time) {
  const g = groups.find(g => g.id === gId);
  if (!g) return;
  g.times = g.times.includes(time) ? g.times.filter(t=>t!==time) : [...g.times, time];
  renderGroups();
}

function renderGroups() {
  const c = document.getElementById('groupsContainer');
  c.innerHTML = '';
  groups.forEach(g => {
    const div = document.createElement('div');
    div.className = 'group-card'+(g.active?'':' disabled');
    div.innerHTML = `
      <div class="group-header">
        <span class="group-name">🎾 ${g.name}</span>
        <div class="group-actions">
          <button class="group-toggle ${g.active?'on':'off'}" onclick="toggleGroup(${g.id})">${g.active?'✅ เปิด':'❌ ปิด'}</button>
          <button class="group-delete" onclick="deleteGroup(${g.id})">🗑 ลบ</button>
        </div>
      </div>
      <div class="group-row">
        <div class="group-section">
          <label>วัน</label>
          <div class="chip-group">${ALL_DAYS.map(d=>`<div class="chip${g.days.includes(d.v)?' active':''}" onclick="toggleDay(${g.id},${d.v})">${d.l}</div>`).join('')}</div>
        </div>
        <div class="group-section">
          <label>เวลา</label>
          <div class="chip-group">${ALL_TIMES.map(t=>`<div class="chip time${g.times.includes(t)?' active':''}" onclick="toggleTime(${g.id},'${t}')">${t}</div>`).join('')}</div>
        </div>
      </div>`;
    c.appendChild(div);
  });
}

// ============ API ============
async function fetchSlots(dateStr, stadiumId, locId) {
  try {
    const r = await fetch(PROXY_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({date:dateStr, stadiumId:String(stadiumId), locId}) });
    const data = await r.json();
    return Array.isArray(data) ? data : [];
  } catch { return []; }
}

async function checkDate(dateStr, times) {
  const result = {};
  let total=0, allOne=true;
  for (const loc of LOCATIONS) {
    result[loc.locId] = {};
    times.forEach(t => result[loc.locId][t] = []);
    for (const court of loc.courts) {
      const slots = await fetchSlots(dateStr, court.id, loc.locId);
      for (const s of slots) {
        total++;
        if (String(s.reservestatus)!=='1') allOne=false;
        if (String(s.reservestatus)==='0' && times.includes(s.timeName)) result[loc.locId][s.timeName].push(court.name);
      }
    }
  }
  if (total>0 && allOne) return null;
  return result;
}

function getTargetDates(days) {
  const dates=[], today=new Date();
  for (let i=0; i<=14; i++) {
    const d=new Date(today); d.setDate(today.getDate()+i);
    if (days.includes(d.getDay())) dates.push(d);
  }
  return dates;
}
function fmt(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtTH(d) { return `${DAY_NAMES[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}`; }

function addLog(msg) {
  const t=new Date().toLocaleTimeString('th-TH');
  const el=document.getElementById('logInner');
  const line=document.createElement('div');
  line.className='log-line'; line.textContent=`[${t}] ${msg}`;
  el.insertBefore(line, el.firstChild);
  document.getElementById('logBox').style.display='block';
}

function renderResults() {
  const rc=document.getElementById('resultsContainer');
  const ac=document.getElementById('alertsContainer');
  rc.innerHTML=''; ac.innerHTML='';
  for (const g of groups) {
    if (!g.active) continue;
    const dates=getTargetDates(g.days);
    const res=groupResults[g.id]||{};
    const alerts=[];
    for (const date of dates) {
      const key=fmt(date); const r=res[key];
      if (!r||r===null) continue;
      const found=[];
      for (const loc of LOCATIONS) for (const t of g.times) { const courts=r[loc.locId]?.[t]||[]; if(courts.length) found.push(`${loc.locName} ${t} → ${courts.join(', ')}`); }
      if (found.length) alerts.push({label:fmtTH(date), lines:found});
    }
    if (alerts.length) {
      const alertDiv=document.createElement('div'); alertDiv.className='alert-box';
      alertDiv.innerHTML=`<h2>🎉 ${g.name} — พบคอร์ทว่าง!</h2>`+alerts.map(a=>`<div class="alert-label">${a.label}</div>${a.lines.map(l=>`<div class="alert-line">• ${l}</div>`).join('')}`).join('')+`<a href="https://crystalsports-booking.kegroup.co.th/booking.php" target="_blank" class="book-btn">📅 จองเลย →</a>`;
      ac.appendChild(alertDiv);
    }
    const section=document.createElement('div');
    section.innerHTML=`<div class="results-group-title">🎾 ${g.name} <span style="color:#4b6280;font-weight:400">(${g.days.map(d=>DAY_NAMES[d]).join(', ')} · ${g.times.join(', ')})</span></div>`;
    const grid=document.createElement('div'); grid.className='grid';
    if (!dates.length||!g.times.length) { grid.innerHTML='<div style="color:#253040;font-size:13px;padding:12px;">⚠️ กรุณาเลือกวันและเวลา</div>'; }
    else {
      for (const date of dates) {
        const key=fmt(date); const r=res[key];
        const hasAny=r&&r!==null&&LOCATIONS.some(loc=>g.times.some(t=>r[loc.locId]?.[t]?.length>0));
        const cls=r===null?'card notopen':r?(hasAny?'card found':'card notfound'):'card';
        const icon=r===null?'🔒':r?(hasAny?'✅':'❌'):'⬜';
        let inner=`<div class="card-title">${icon} ${fmtTH(date)}</div><div class="card-date">${key}</div>`;
        if (r===null) inner+=`<div class="pending" style="color:#334155">ยังไม่เปิดให้จอง</div>`;
        else if (!r) inner+=`<div class="pending">ยังไม่ได้เช็ค</div>`;
        else { for (const loc of LOCATIONS) { const locHas=g.times.some(t=>r[loc.locId]?.[t]?.length>0); inner+=`<div class="loc-title" style="color:${locHas?'#86efac':'#4b6280'}">${locHas?'✅':'❌'} ${loc.locName}</div>`; for (const t of g.times) { const courts=r[loc.locId]?.[t]||[]; inner+=`<div class="slot-row"><span class="slot-time">${t}</span><span class="${courts.length?'slot-avail':'slot-full'}">${courts.length?courts.length+' court':'เต็ม'}</span></div>`; if(courts.length) inner+=`<div class="court-names">${courts.join(', ')}</div>`; } } }
        const card=document.createElement('div'); card.className=cls; card.id=`card-${g.id}-${key}`; card.innerHTML=inner;
        grid.appendChild(card);
      }
    }
    section.appendChild(grid); rc.appendChild(section);
  }
}

async function checkAll() {
  const btn=document.getElementById('btnCheck'); btn.disabled=true;
  groupResults={};
  for (const g of groups) {
    if (!g.active) continue;
    const dates=getTargetDates(g.days);
    groupResults[g.id]={}; const alerts=[];
    addLog(`🔍 เช็ค ${g.name}...`);
    for (const date of dates) {
      const key=fmt(date), label=fmtTH(date);
      const card=document.getElementById(`card-${g.id}-${key}`);
      if(card){card.className='card checking';card.querySelector('.card-title').textContent='⏳ '+label;}
      const res=await checkDate(key,g.times);
      groupResults[g.id][key]=res;
      if(res===null){addLog(`🔒 ${g.name} ${label}`);renderResults();continue;}
      const found=[];
      for(const loc of LOCATIONS) for(const t of g.times){const courts=res[loc.locId]?.[t]||[];if(courts.length) found.push(`${loc.locName} ${t} → ${courts.join(', ')}`);}
      if(found.length){alerts.push({label,lines:found});addLog(`🎾 ${g.name} พบว่าง ${label}`);}
      else addLog(`❌ ${g.name} ${label}`);
      renderResults();
    }
    if(alerts.length){
      const tgLines=alerts.map(a=>`📅 <b>${a.label}</b>\n${a.lines.map(l=>'  • '+l).join('\n')}`).join('\n\n');
      const msg=`🎾 <b>${g.name} — พบคอร์ทว่าง!</b>\n\n${tgLines}\n\n<a href="https://crystalsports-booking.kegroup.co.th/booking.php">👉 จองเลย</a>`;
      try{const d=await sendTelegram(msg);addLog(d.ok?`📲 ${g.name} ส่ง Telegram`:`❌ ${d.description}`);}catch(e){addLog(`❌ ${e.message}`);}
    }
  }
  document.getElementById('lastCheck').textContent='เช็คล่าสุด '+new Date().toLocaleTimeString('th-TH');
  btn.disabled=false;
}

function toggleAuto() {
  const btn=document.getElementById('btnAuto'); autoOn=!autoOn;
  if(autoOn){
    btn.classList.add('on'); checkAll();
    let secs=INTERVAL/1000;
    const upd=()=>btn.textContent=`🔄 Auto ON · ${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}`;
    upd();
    autoTimer=setInterval(()=>{checkAll();secs=INTERVAL/1000;},INTERVAL);
    cdTimer=setInterval(()=>{secs=Math.max(0,secs-1);upd();},1000);
  }else{
    btn.classList.remove('on'); btn.textContent='⏰ Auto (ทุก 30 นาที)';
    clearInterval(autoTimer);clearInterval(cdTimer);
  }
}

// ============ INIT ============
// อ่าน session จาก URL hash (หลัง Google OAuth redirect)
async function initAuth() {
  // ถ้า URL มี access_token ให้ Supabase อ่านจาก hash
  if (window.location.hash.includes('access_token')) {
    const { data, error } = await sb.auth.getSession();
    if (data?.session?.user) {
      // ล้าง hash ออกจาก URL
      history.replaceState(null, '', window.location.pathname);
      showApp(data.session.user);
      return;
    }
  }
  // ปกติให้ใช้ onAuthStateChange
  const { data } = await sb.auth.getSession();
  if (data?.session?.user) {
    showApp(data.session.user);
  } else {
    showAuth();
  }
}

sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session?.user) showApp(session.user);
  else if (event === 'SIGNED_OUT') showAuth();
});

initAuth();
</script>
