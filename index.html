<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎾 Crystal Sports Court Checker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080e1a; color: #dde8f0; font-family: 'Sarabun','Segoe UI',sans-serif; min-height: 100vh; }

  header h1 { font-size: 18px; font-weight: 700; color: #2dd4bf; }
  header p { font-size: 12px; color: #4b6280; margin-top: 2px; }
  .main { padding: 20px 24px; max-width: 960px; margin: 0 auto; }

  /* Groups */
  .groups-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .groups-header h3 { font-size: 13px; color: #7a99b8; text-transform: uppercase; letter-spacing: 0.5px; }
  .add-group-btn { background: linear-gradient(135deg,#2dd4bf,#0891b2); color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }

  .group-card { background: #0f1923; border: 1px solid #1a2840; border-radius: 12px; padding: 16px; margin-bottom: 12px; position: relative; }
  .group-card.disabled { opacity: 0.4; }
  .group-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .group-name { font-size: 14px; font-weight: 700; color: #2dd4bf; }
  .group-actions { display: flex; gap: 8px; align-items: center; }
  .group-toggle { background: none; border: 1px solid #334155; border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; font-family: inherit; }
  .group-toggle.active { background: #052e16; border-color: #22c55e; color: #4ade80; }
  .group-toggle.inactive { background: #1c0e0e; border-color: #7f1d1d; color: #f87171; }
  .group-delete { background: none; border: 1px solid #5f1a1a; border-radius: 6px; padding: 4px 10px; font-size: 12px; color: #f87171; cursor: pointer; font-family: inherit; }
  .group-delete:hover { background: #1c0e0e; }

  .group-row { display: flex; gap: 20px; flex-wrap: wrap; }
  .group-section { flex: 1; min-width: 180px; }
  .group-section label { font-size: 11px; color: #4b6280; display: block; margin-bottom: 6px; }
  .chip-group { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid #1a2840; background: #080e1a; color: #4b6280; transition: all 0.15s; user-select: none; }
  .chip.active { background: #0e3a2f; border-color: #22c55e; color: #4ade80; }
  .chip.active.time { background: #0c2a4a; border-color: #38bdf8; color: #7dd3fc; }

  /* Token bar */
  .token-bar { background: #0f1923; border: 1px solid #1a2840; border-radius: 12px; padding: 14px 18px; margin-bottom: 16px; }
  .token-bar-inner { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .token-bar input { background: #050d18; border: 1px solid #1a2840; border-radius: 8px; padding: 9px 14px; color: #dde8f0; font-size: 13px; flex: 1; min-width: 200px; font-family: inherit; }
  .gh-status { font-size: 12px; color: #4b6280; margin-top: 8px; }
  #ghVarDisplay { color: #7dd3fc; }

  /* Controls */
  .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .btn { border: none; border-radius: 9px; padding: 11px 22px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .btn-check { background: linear-gradient(135deg,#2dd4bf,#0891b2); color: #fff; box-shadow: 0 4px 16px rgba(45,212,191,.2); }
  .btn-check:disabled { background: #1a2840; color: #4b6280; box-shadow: none; cursor: not-allowed; }
  .btn-save { background: linear-gradient(135deg,#7c3aed,#4f46e5); color: #fff; font-size: 13px; }
  .btn-load { background: #0c2a4a; color: #7dd3fc; border: 1px solid #1e3a5f; font-size: 13px; }
  .btn-test { background: #0f2b1f; color: #4ade80; border: 1px solid #166534; font-size: 13px; }
  #btnAuto { background: #0f1923; color: #7a99b8; border: 1px solid #1a2840; }
  #btnAuto.on { background: linear-gradient(135deg,#6d28d9,#4338ca); color: #fff; border-color: #6d28d9; }

  .tg-info { background: #0a1f14; border: 1px solid #14532d; border-radius: 10px; padding: 10px 16px; margin-bottom: 16px; font-size: 13px; color: #86efac; }

  /* Results */
  .results-section { margin-bottom: 20px; }
  .results-group-title { font-size: 13px; font-weight: 700; color: #7a99b8; margin-bottom: 8px; padding: 6px 12px; background: #0a1220; border-radius: 6px; display: flex; align-items: center; gap: 8px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(195px,1fr)); gap: 10px; margin-bottom: 14px; }
  .card { background: #0f1923; border: 1px solid #1a2840; border-radius: 12px; padding: 14px 16px; }
  .card.checking { background: #0a1e35; border-color: #38bdf8; }
  .card.found { background: #032012; border-color: #22c55e; }
  .card.notfound { background: #150808; border-color: #5f1a1a; }
  .card.notopen { opacity: 0.4; }
  .card-title { font-weight: 700; font-size: 14px; margin-bottom: 3px; }
  .card-date { font-size: 11px; color: #4b6280; margin-bottom: 8px; }
  .loc-title { font-size: 11px; font-weight: 600; margin-bottom: 3px; margin-top: 5px; }

  .slot-time { color: #4b6280; }
  .slot-avail { color: #22c55e; font-weight: 600; }
  .slot-full { color: #e05050; font-weight: 600; }
  .court-names { font-size: 10px; color: #4ade80; margin-top: 2px; line-height: 1.5; }
  .pending { color: #253040; font-size: 12px; }
  .empty-msg { color: #253040; font-size: 13px; text-align: center; padding: 20px; grid-column: 1/-1; }

  .alert-box { background: #032012; border: 1px solid #22c55e; border-radius: 12px; padding: 14px 18px; margin-bottom: 16px; }
  .alert-box h2 { color: #4ade80; font-size: 15px; margin-bottom: 8px; }
  .alert-line { color: #bbf7d0; font-size: 13px; padding-left: 10px; margin-top: 2px; }
  .alert-label { color: #86efac; font-weight: 700; margin-top: 6px; }
  .book-btn { display: inline-block; margin-top: 10px; background: #22c55e; color: #fff; padding: 8px 18px; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 13px; }

  .log-box { background: #0f1923; border: 1px solid #1a2840; border-radius: 10px; padding: 12px 16px; }
  .log-title { color: #4b6280; font-size: 12px; margin-bottom: 6px; }
  .log-inner { max-height: 120px; overflow-y: auto; }
  .log-line { font-size: 11px; color: #374860; margin-bottom: 1px; font-family: monospace; }

  #saveStatus, #tgStatus { font-size: 13px; }
  #lastCheck { font-size: 12px; color: #4b6280; }
</style>
</head>

<div class="main">

<script>
const PROXY_URL = "https://crystal-proxy.roong-bee23.workers.dev";
const TELEGRAM_TOKEN = "8979299516:AAEwY_fKOaflP-Y3o-DnJqKrzCViLJvel-c";
const TELEGRAM_CHAT_ID = "839952182";
const GITHUB_REPO = "roongbee23-dev/tennis-checker";
const DAY_NAMES = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัส","ศุกร์","เสาร์"];
const ALL_DAYS = [{v:1,l:"จันทร์"},{v:2,l:"อังคาร"},{v:3,l:"พุธ"},{v:4,l:"พฤหัส"},{v:5,l:"ศุกร์"},{v:6,l:"เสาร์"},{v:0,l:"อาทิตย์"}];
const ALL_TIMES = ["06:00","07:00","08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00","19:00","20:00","21:00","22:00","23:00"];
const LOCATIONS = [
  { locId:"LOC001", locName:"Crystal Sports",
    courts:[{id:1,name:"North-1"},{id:2,name:"North-2"},{id:3,name:"North-3"},{id:4,name:"Center-1"},{id:5,name:"Center-2"},{id:6,name:"South-1"},{id:7,name:"South-2"},{id:8,name:"South-3"}] },
  { locId:"LOC002", locName:"Crystal Sports G",
    courts:[{id:18,name:"G North-1"},{id:19,name:"G North-2"},{id:20,name:"G North-3"},{id:21,name:"G Center-1"},{id:22,name:"G Center-2"},{id:23,name:"G Center-3"},{id:24,name:"G South-1"},{id:25,name:"G South-2"},{id:26,name:"G South-3"}] },
];

function getToken() { return localStorage.getItem('gh_token') || ''; }

// ============ GROUPS ============
let groups = [];
let groupResults = {};
let autoTimer = null, cdTimer = null, autoOn = false;
const INTERVAL = 30 * 60 * 1000;

function saveGroupsLocal() {
  localStorage.setItem('court_groups', JSON.stringify(groups));
}
function loadGroupsLocal() {
  try {
    const g = JSON.parse(localStorage.getItem('court_groups') || '[]');
    return g.length ? g : defaultGroups();
  } catch { return defaultGroups(); }
}
function defaultGroups() {
  return [
    { id: Date.now(), name: "Group 1", days: [2,3,4,5], times: ["18:00","19:00"], active: true },
  ];
}

function addGroup() {
  const id = Date.now();
  groups.push({ id, name: `Group ${groups.length+1}`, days: [2,3,4,5], times: ["18:00","19:00"], active: true });
  saveGroupsLocal();
  renderGroups();
}

function deleteGroup(id) {
  if (groups.length <= 1) { addLog("⚠️ ต้องมีอย่างน้อย 1 group"); return; }
  groups = groups.filter(g => g.id !== id);
  delete groupResults[id];
  saveGroupsLocal();
  renderGroups();
  renderResults();
}

function toggleGroup(id) {
  const g = groups.find(g => g.id === id);
  if (g) { g.active = !g.active; saveGroupsLocal(); renderGroups(); }
}

function toggleGroupDay(groupId, day) {
  const g = groups.find(g => g.id === groupId);
  if (!g) return;
  if (g.days.includes(day)) g.days = g.days.filter(d => d !== day);
  else g.days.push(day);
  saveGroupsLocal();
  renderGroups();
}

function toggleGroupTime(groupId, time) {
  const g = groups.find(g => g.id === groupId);
  if (!g) return;
  if (g.times.includes(time)) g.times = g.times.filter(t => t !== time);
  else g.times.push(time);
  saveGroupsLocal();
  renderGroups();
}

function renderGroups() {
  const container = document.getElementById('groupsContainer');
  container.innerHTML = '';
  groups.forEach(g => {
    const div = document.createElement('div');
    div.className = 'group-card' + (g.active ? '' : ' disabled');
    div.innerHTML = `
      <div class="group-header">
        <span class="group-name">🎾 ${g.name}</span>
        <div class="group-actions">
          <button class="group-toggle ${g.active?'active':'inactive'}" onclick="toggleGroup(${g.id})">
            ${g.active ? '✅ เปิดอยู่' : '❌ ปิดอยู่'}
          </button>
          <button class="group-delete" onclick="deleteGroup(${g.id})">🗑 ลบ</button>
        </div>
      </div>
      <div class="group-row">
        <div class="group-section">
          <label>วัน</label>
          <div class="chip-group">
            ${ALL_DAYS.map(d => `<div class="chip${g.days.includes(d.v)?' active':''}" onclick="toggleGroupDay(${g.id},${d.v})">${d.l}</div>`).join('')}
          </div>
        </div>
        <div class="group-section">
          <label>เวลา</label>
          <div class="chip-group">
            ${ALL_TIMES.map(t => `<div class="chip time${g.times.includes(t)?' active':''}" onclick="toggleGroupTime(${g.id},'${t}')">${t}</div>`).join('')}
          </div>
        </div>
      </div>
    `;
    container.appendChild(div);
  });
}

// ============ GITHUB ============
async function updateGithubVar(name, value) {
  const token = getToken();
  const url = `https://api.github.com/repos/${GITHUB_REPO}/actions/variables/${name}`;
  const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github+json' };
  const res = await fetch(url, { method:'PATCH', headers, body: JSON.stringify({name, value}) });
  if (res.status === 404) {
    const res2 = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/actions/variables`, {
      method:'POST', headers, body: JSON.stringify({name, value})
    });
    if (!res2.ok) throw new Error(`GitHub API error: ${res2.status}`);
  } else if (!res.ok) throw new Error(`GitHub API error: ${res.status}`);
}

async function saveToGithub() {
  const el = document.getElementById('saveStatus');
  el.style.color = '#7a99b8'; el.textContent = 'กำลังบันทึก...';
  try {
    // เก็บ groups เป็น JSON string ใน variable เดียว
    const activeGroups = groups.filter(g => g.active);
    await updateGithubVar('COURT_GROUPS', JSON.stringify(activeGroups));
    el.style.color = '#4ade80'; el.textContent = `✅ บันทึก ${activeGroups.length} group แล้ว`;
    updateGhDisplay();
    addLog(`💾 บันทึก ${activeGroups.length} groups ไปยัง GitHub`);
  } catch(e) { el.style.color='#f87171'; el.textContent=`❌ ${e.message}`; }
  setTimeout(() => el.textContent='', 5000);
}

async function loadFromGithub() {
  const token = getToken();
  if (!token) { document.getElementById('ghVarDisplay').textContent = 'ใส่ Token ก่อน'; return; }
  document.getElementById('ghVarDisplay').textContent = 'กำลังโหลด...';
  try {
    const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/actions/variables/COURT_GROUPS`, {
      headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' }
    });
    if (res.ok) {
      const data = await res.json();
      const loaded = JSON.parse(data.value);
      groups = loaded.map(g => ({...g, active: true}));
      saveGroupsLocal();
      renderGroups();
      updateGhDisplay();
      addLog('🔄 โหลด groups จาก GitHub แล้ว');
    } else {
      document.getElementById('ghVarDisplay').textContent = 'ยังไม่มีข้อมูลบน GitHub';
    }
  } catch(e) { document.getElementById('ghVarDisplay').textContent = 'โหลดไม่ได้'; }
}

function updateGhDisplay() {
  const active = groups.filter(g => g.active);
  const text = active.map(g => {
    const days = g.days.map(d => DAY_NAMES[d]).join(',');
    const times = g.times.join(',');
    return `[${g.name}: ${days} | ${times}]`;
  }).join(' ');
  document.getElementById('ghVarDisplay').textContent = text || 'ไม่มี group ที่เปิดอยู่';
}

// ============ API ============
async function fetchSlots(dateStr, stadiumId, locId) {
  try {
    const r = await fetch(PROXY_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({date:dateStr, stadiumId:String(stadiumId), locId})
    });
    const data = await r.json();
    return Array.isArray(data) ? data : [];
  } catch { return []; }
}

async function checkDate(dateStr, times) {
  const result = {};
  let total = 0, allOne = true;
  for (const loc of LOCATIONS) {
    result[loc.locId] = {};
    times.forEach(t => result[loc.locId][t] = []);
    for (const court of loc.courts) {
      const slots = await fetchSlots(dateStr, court.id, loc.locId);
      for (const s of slots) {
        total++;
        if (String(s.reservestatus) !== '1') allOne = false;
        if (String(s.reservestatus) === '0' && times.includes(s.timeName)) {
          result[loc.locId][s.timeName].push(court.name);
        }
      }
    }
  }
  if (total > 0 && allOne) return null;
  return result;
}

// ============ DATES ============
function getTargetDates(days) {
  const dates = [], today = new Date();
  for (let i = 0; i <= 14; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    if (days.includes(d.getDay())) dates.push(d);
  }
  return dates;
}
function fmt(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtTH(d) { return `${DAY_NAMES[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}`; }

// ============ LOG ============
function addLog(msg) {
  const t = new Date().toLocaleTimeString('th-TH');
  const el = document.getElementById('logInner');
  const line = document.createElement('div');
  line.className = 'log-line'; line.textContent = `[${t}] ${msg}`;
  el.insertBefore(line, el.firstChild);
  document.getElementById('logBox').style.display = 'block';
}

// ============ RENDER ============
function renderResults() {
  const container = document.getElementById('resultsContainer');
  const alertsContainer = document.getElementById('alertsContainer');
  container.innerHTML = '';
  alertsContainer.innerHTML = '';

  for (const g of groups) {
    if (!g.active) continue;
    const dates = getTargetDates(g.days);
    const res = groupResults[g.id] || {};

    // Alert
    const alerts = [];
    for (const date of dates) {
      const key = fmt(date);
      const r = res[key];
      if (!r || r === null) continue;
      const found = [];
      for (const loc of LOCATIONS) {
        for (const t of g.times) {
          const courts = r[loc.locId]?.[t] || [];
          if (courts.length) found.push(`${loc.locName} ${t} → ${courts.join(', ')}`);
        }
      }
      if (found.length) alerts.push({label: fmtTH(date), lines: found});
    }
    if (alerts.length) {
      const alertDiv = document.createElement('div');
      alertDiv.className = 'alert-box';
      alertDiv.innerHTML = `<h2>🎉 ${g.name} — พบคอร์ทว่าง! (ส่ง Telegram แล้ว)</h2>` +
        alerts.map(a => `<div class="alert-label">${a.label}</div>${a.lines.map(l=>`<div class="alert-line">• ${l}</div>`).join('')}`).join('') +
        `<a href="https://crystalsports-booking.kegroup.co.th/booking.php" target="_blank" class="book-btn">📅 จองเลย →</a>`;
      alertsContainer.appendChild(alertDiv);
    }

    // Grid
    const section = document.createElement('div');
    section.className = 'results-section';
    section.innerHTML = `<div class="results-group-title">🎾 ${g.name} <span style="color:#4b6280;font-weight:400">(${g.days.map(d=>DAY_NAMES[d]).join(', ')} · ${g.times.join(', ')})</span></div>`;
    const grid = document.createElement('div');
    grid.className = 'grid';

    if (!dates.length || !g.times.length) {
      grid.innerHTML = '<div class="empty-msg">⚠️ กรุณาเลือกวันและเวลา</div>';
    } else {
      for (const date of dates) {
        const key = fmt(date);
        const r = res[key];
        const hasAny = r && r !== null && LOCATIONS.some(loc => g.times.some(t => r[loc.locId]?.[t]?.length > 0));
        const cls = r === null ? 'card notopen' : r ? (hasAny ? 'card found' : 'card notfound') : 'card';
        const icon = r === null ? '🔒' : r ? (hasAny ? '✅' : '❌') : '⬜';

        let inner = `<div class="card-title">${icon} ${fmtTH(date)}</div><div class="card-date">${key}</div>`;
        if (r === null) { inner += `<div class="pending" style="color:#334155">ยังไม่เปิดให้จอง</div>`; }
        else if (!r) { inner += `<div class="pending">ยังไม่ได้เช็ค</div>`; }
        else {
          for (const loc of LOCATIONS) {
            const locHas = g.times.some(t => r[loc.locId]?.[t]?.length > 0);
            inner += `<div class="loc-title" style="color:${locHas?'#86efac':'#4b6280'}">${locHas?'✅':'❌'} ${loc.locName}</div>`;
            for (const t of g.times) {
              const courts = r[loc.locId]?.[t] || [];
              inner += `<div class="slot-row"><span class="slot-time">${t}</span><span class="${courts.length?'slot-avail':'slot-full'}">${courts.length?courts.length+' court':'เต็ม'}</span></div>`;
              if (courts.length) inner += `<div class="court-names">${courts.join(', ')}</div>`;
            }
          }
        }
        const card = document.createElement('div');
        card.className = cls; card.id = `card-${g.id}-${key}`; card.innerHTML = inner;
        grid.appendChild(card);
      }
    }
    section.appendChild(grid);
    container.appendChild(section);
  }
}

// ============ CHECK ALL ============
async function checkAll() {
  const btn = document.getElementById('btnCheck');
  btn.disabled = true;
  groupResults = {};

  for (const g of groups) {
    if (!g.active) continue;
    const dates = getTargetDates(g.days);
    groupResults[g.id] = {};
    const alerts = [];
    addLog(`🔍 เช็ค ${g.name}...`);

    for (const date of dates) {
      const key = fmt(date);
      const label = fmtTH(date);
      const card = document.getElementById(`card-${g.id}-${key}`);
      if (card) { card.className='card checking'; card.querySelector('.card-title').textContent='⏳ '+label; }

      const res = await checkDate(key, g.times);
      groupResults[g.id][key] = res;

      if (res === null) { addLog(`🔒 ${g.name} ${label} — ยังไม่เปิด`); renderResults(); continue; }

      const found = [];
      for (const loc of LOCATIONS) {
        for (const t of g.times) {
          const courts = res[loc.locId]?.[t] || [];
          if (courts.length) found.push(`${loc.locName} ${t} → ${courts.join(', ')}`);
        }
      }
      if (found.length) {
        alerts.push({label, lines:found});
        addLog(`🎾 ${g.name} พบว่าง ${label}`);
      } else addLog(`❌ ${g.name} ${label} — ไม่ว่าง`);
      renderResults();
    }

    // ส่ง Telegram แยกต่อ group
    if (alerts.length) {
      const tgLines = alerts.map(a=>`📅 <b>${a.label}</b>\n${a.lines.map(l=>'  • '+l).join('\n')}`).join('\n\n');
      const msg = `🎾 <b>${g.name} — พบคอร์ทว่าง!</b>\n\n${tgLines}\n\n<a href="https://crystalsports-booking.kegroup.co.th/booking.php">👉 จองเลย</a>`;
      try { const d = await sendTelegram(msg); addLog(d.ok?`📲 ${g.name} ส่ง Telegram แล้ว`:`❌ Telegram: ${d.description}`); }
      catch(e) { addLog(`❌ ${e.message}`); }
    }
  }

  document.getElementById('lastCheck').textContent = 'เช็คล่าสุด '+new Date().toLocaleTimeString('th-TH');
  btn.disabled = false;
}

// ============ AUTO ============
function toggleAuto() {
  const btn = document.getElementById('btnAuto');
  autoOn = !autoOn;
  if (autoOn) {
    btn.classList.add('on');
    checkAll();
    let secs = INTERVAL/1000;
    const upd = () => btn.textContent=`🔄 Auto ON · ${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}`;
    upd();
    autoTimer = setInterval(()=>{ checkAll(); secs=INTERVAL/1000; }, INTERVAL);
    cdTimer = setInterval(()=>{ secs=Math.max(0,secs-1); upd(); }, 1000);
  } else {
    btn.classList.remove('on');
    btn.textContent = '⏰ Auto (ทุก 30 นาที)';
    clearInterval(autoTimer); clearInterval(cdTimer);
  }
}

// ============ INIT ============
groups = loadGroupsLocal();
renderGroups();
renderResults();
const savedToken = localStorage.getItem('gh_token');
if (savedToken) document.getElementById('ghToken').value = savedToken;
