name: Tennis Court Checker

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check courts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 << 'EOF'
          import urllib.request, json, datetime, os

          SUPABASE_URL = os.environ.get("SUPABASE_URL", "https://szckhdejflscildnuthy.supabase.co")
          SUPABASE_KEY = os.environ.get("SUPABASE_SERVICE_KEY", "")
          TOKEN = "8979299516:AAEwY_fKOaflP-Y3o-DnJqKrzCViLJvel-c"

          LOCATIONS = [
            {"locId":"LOC001","locName":"Crystal Sports",
             "courts":[{"id":1,"name":"North-1"},{"id":2,"name":"North-2"},{"id":3,"name":"North-3"},
                       {"id":4,"name":"Center-1"},{"id":5,"name":"Center-2"},
                       {"id":6,"name":"South-1"},{"id":7,"name":"South-2"},{"id":8,"name":"South-3"}]},
            {"locId":"LOC002","locName":"Crystal Sports G",
             "courts":[{"id":18,"name":"G North-1"},{"id":19,"name":"G North-2"},{"id":20,"name":"G North-3"},
                       {"id":21,"name":"G Center-1"},{"id":22,"name":"G Center-2"},{"id":23,"name":"G Center-3"},
                       {"id":24,"name":"G South-1"},{"id":25,"name":"G South-2"},{"id":26,"name":"G South-3"}]}
          ]

          # ดึง users ที่ approved และมี telegram_chat_id จาก Supabase
          def fetch_users():
            url = f"{SUPABASE_URL}/rest/v1/user_settings?is_approved=eq.true&telegram_chat_id=not.is.null&select=id,email,telegram_chat_id,court_groups"
            req = urllib.request.Request(url, headers={
              "apikey": SUPABASE_KEY,
              "Authorization": f"Bearer {SUPABASE_KEY}"
            })
            with urllib.request.urlopen(req, timeout=10) as r:
              return json.loads(r.read())

          def fetch_slots(date_str, stadium_id, loc_id):
            try:
              body = json.dumps({"date":date_str,"stadiumId":str(stadium_id),"locId":loc_id}).encode()
              req = urllib.request.Request(
                "https://crystalsports-booking.kegroup.co.th/api_helper.php?action=getAvailableStadiums",
                data=body, headers={"Content-Type":"application/json"}, method="POST")
              with urllib.request.urlopen(req, timeout=10) as r:
                return json.loads(r.read())
            except:
              return []

          def send_telegram(chat_id, msg):
            body = json.dumps({"chat_id": chat_id, "text": msg, "parse_mode": "HTML"}).encode()
            req = urllib.request.Request(
              f"https://api.telegram.org/bot{TOKEN}/sendMessage",
              data=body, headers={"Content-Type":"application/json"}, method="POST")
            urllib.request.urlopen(req, timeout=10)

          today = datetime.date.today()
          day_names = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัส","ศุกร์","เสาร์"]

          # ดึง users
          try:
            users = fetch_users()
            print(f"Found {len(users)} approved users")
          except Exception as e:
            print(f"Failed to fetch users: {e}")
            users = []

          for user in users:
            chat_id = user.get("telegram_chat_id", "").strip()
            email = user.get("email", "-")
            groups = user.get("court_groups") or []

            if not chat_id or not groups:
              print(f"Skip {email}: no chat_id or no groups")
              continue

            print(f"\n=== Checking for {email} (chat_id: {chat_id}), {len(groups)} group(s) ===")

            for g in groups:
              if not g.get("active", True):
                continue

              target_days = [int(d) for d in g.get("days", [])]
              target_times = g.get("times", [])
              group_name = g.get("name", "Group")

              if not target_days or not target_times:
                continue

              alerts = []

              for i in range(15):
                d = today + datetime.timedelta(days=i)
                dow = (d.weekday() + 1) % 7
                if dow not in target_days:
                  continue

                date_str = d.strftime("%Y-%m-%d")
                found = []

                for loc in LOCATIONS:
                  for court in loc["courts"]:
                    slots = fetch_slots(date_str, court["id"], loc["locId"])
                    if not slots:
                      continue
                    all_one = all(str(s.get("reservestatus")) == "1" for s in slots)
                    if all_one:
                      continue
                    for s in slots:
                      if str(s.get("reservestatus")) == "0" and s.get("timeName") in target_times:
                        found.append(f'{loc["locName"]} {s["timeName"]} → {court["name"]}')

                if found:
                  day_th = day_names[dow]
                  alerts.append(f'📅 <b>{day_th} {d.day}/{d.month}</b>\n' + '\n'.join(f'  • {f}' for f in found))

              if alerts:
                msg = f'🎾 <b>{group_name} — พบคอร์ทว่าง!</b>\n\n' + '\n\n'.join(alerts)
                msg += '\n\n<a href="https://crystalsports-booking.kegroup.co.th/booking.php">👉 จองเลย</a>'
                try:
                  send_telegram(chat_id, msg)
                  print(f"  ✅ Sent [{group_name}] to {email}")
                except Exception as e:
                  print(f"  ❌ Telegram error [{group_name}] {email}: {e}")
              else:
                print(f"  No courts available for [{group_name}] {email}")

          EOF

  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Keep alive
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          echo "Last run: $(date)" > .last_run
          git add .last_run
          git commit -m "keepalive" || echo "Nothing to commit"
          git push
